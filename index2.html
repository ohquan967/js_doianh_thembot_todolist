<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Counter</title>
  <style>
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 100%;
    max-width: 420px;
    text-align: center;
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  h2 {
    margin-bottom: 10px;
    color: #333;
  }

  #value {
    font-size: 64px;
    margin: 20px 0;
    font-weight: bold;
    color: #333;
  }

  button {
    margin: 10px;
    padding: 8px 12px;
    font-size: 10x;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    color: white;
    transition: 0.2s;
    font-weight: 500;
  }

  button:hover {
    transform: translateY(-1px);
  }

  .increase {
    background: #6c63ff;
  }
  .increase:hover {
    background: #574fd6;
  }

  .increase_5 {
    background: #22c55e;
  }
  .increase_5:hover {
    background: #16a34a;
  }

  .decrease {
    background: #ffb020;
  }
  .decrease:hover {
    background: #e69a00;
  }

  .decrease_5 {
    background: #ff4d4f;
  }
  .decrease_5:hover {
    background: #d9363e;
  }

  .reset {
    background: #666;
  }
  .reset:hover {
    background: #444;
  }
</style>
  </style>
</head>
<body>

  <div class="container">
    <h2>Counter</h2>
    <div id="value">0</div>
    <button class="decrease_5" onclick="decrease_5()">Giảm 5</button>
    <button class="decrease" onclick="decrease()">Giảm 1</button>
    <button class="reset" onclick="reset()">Đặt lại</button>
    <button class="increase" onclick="increase()">Tăng 1</button>
    <button class="increase_5" onclick="increase_5()">Tăng 5</button>
  </div>

  <script src="node.js"></script>

</body>
</html>
