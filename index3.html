<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý công việc</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 520px;
      background: #fff;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #6c63ff;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }

    button:hover {
      background: #574fd6;
      transform: translateY(-1px);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-radius: 10px;
      background: #f7f7f7;
      margin-bottom: 10px;
      transition: 0.2s;
    }

    li:hover {
      background: #eee;
    }

    .done {
      text-decoration: line-through;
      color: #999;
    }

    .actions button {
      margin-left: 5px;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 8px;
    }

    .delete {
      background: #ff4d4f;
    }

    .delete:hover {
      background: #d9363e;
    }

    .complete {
      background: #22c55e;
    }

    .complete:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="app">
    <h2>To-do App</h2>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Nhập công việc..." />
      <button id="addBtn">Thêm</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="node.js"></script>
</body>
</html>
