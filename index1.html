<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Change_img</title>
    <style>
        body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
    max-width: 420px;
  }

  h2 {
    margin-bottom: 15px;
    color: #333;
  }

  img {
    width: 100%;
    max-width: 320px;
    height: auto;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
  }

  img:hover {
    transform: scale(1.02);
  }

  button {
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background: #6c63ff;
    color: white;
    font-weight: 500;
    transition: 0.2s;
  }

  button:hover {
    background: #574fd6;
    transform: translateY(-1px);
  }
    </style>
</head>
<body>
    <div class="container">
    <img id="myImage" src="https://encrypted-tbn0.gstatic.com/licensed-image?q=tbn:ANd9GcQPJ_ioxRJogLllkP20rAYLKrkm64s7a_N1CxMXmC_Lhw_VJSwZM3By9OGi-Zqu_oVzJWEQDimQSMA1Pa-RMDBcvEQkcJa0bZTs7POWJmUj9VGY4H1EJ37HADacmEvckoDljwZOW_fHePaD&s=19" alt="ảnh">
    <br>
    <button onclick="changeImage()">Đổi ảnh</button>
    <script src="node.js"></script>
    </div>
</body>
</html>
